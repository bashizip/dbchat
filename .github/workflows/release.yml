name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            x86_64-apple-darwin)    OS_ARCH="darwin-x86_64" ;;
            aarch64-apple-darwin)   OS_ARCH="darwin-aarch64" ;;
            x86_64-unknown-linux-gnu) OS_ARCH="linux-x86_64" ;;
            aarch64-unknown-linux-gnu) OS_ARCH="linux-aarch64" ;;
          esac
          ARCHIVE="dbchat-${OS_ARCH}.tar.gz"
          TMPDIR=$(mktemp -d)
          cp "target/$TARGET/release/dbchat" "$TMPDIR/"
          cp README.md "$TMPDIR/" || true
          tar -czf "$ARCHIVE" -C "$TMPDIR" .
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dbchat-*.tar.gz
            dbchat-*.tar.gz.sha256
