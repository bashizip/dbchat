name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            x86_64-apple-darwin)    OS_ARCH="darwin-x86_64" ;;
            aarch64-apple-darwin)   OS_ARCH="darwin-aarch64" ;;
            x86_64-unknown-linux-gnu) OS_ARCH="linux-x86_64" ;;
            aarch64-unknown-linux-gnu) OS_ARCH="linux-aarch64" ;;
          esac
          ARCHIVE="dbchat-${OS_ARCH}.tar.gz"
          TMPDIR=$(mktemp -d)
          cp "target/$TARGET/release/dbchat" "$TMPDIR/"
          cp README.md "$TMPDIR/" || true
          tar -czf "$ARCHIVE" -C "$TMPDIR" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dbchat-*.tar.gz

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum dbchat-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
